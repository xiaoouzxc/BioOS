<style type="text/css"> 
#backToHomeLabel{
		display: inline-block;

		 background-image: url(image/backHome.png);

#importResultLabel{

	/* 模态对话框样式 */
        #myModal {
            display: none; /* 默认隐藏 */
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            background: #fff;
            border: 1px solid #ccc;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            z-index: 1000;
        }
        /* 模态背景 */
        #modalBackground {
            display: none; /* 默认隐藏 */
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.3);
            z-index: 900;
        }
	
</style>
<body>
	<div style="font-size: 0;" id="home" >		
		<img src="image/Buttonplus.png" id="appselectLabel"  ></img>
		<div id="selectapp" style="grid-auto-flow: column;" hidden>
			<label for="backToHome" id="backToHomeLabel">返回主页</label>
		<button id="backToHome" onclick="window.location.href='/'" style="display: none;"></button>
			
		
			
		<div id="selmonlable">

		</div>
		
		</div>

            <div>
                <label for="tableSelect">选择日期</label>

                    <option th:each="dateTable : ${nameList}"

                            th:text="${dateTable.toString()}">
                    </option>
                </select>

<script>
        function openModal() {
            document.getElementById("myModal").style.display = "block";
            document.getElementById("modalBackground").style.display = "block";
        }

        function closeModal() {
            document.getElementById("myModal").style.display = "none";
            document.getElementById("modalBackground").style.display = "none";
        }
    </script>
