	 function todo(id){

     function DHLresultExchange(char){
		 if(char=="a"){
			 return "RV,SC";
		 }else if(char=="b"){
			 return "RV";
		 }else if(char=="c"){
			 return "SC";
		 }
		 return " ";
	 }
	 function XLDresultExchange(char){
		 if(char=="a"){
			 return "RV,SC";
		 }else if(char=="b"){
			 return "RV";
		 }else if(char==="c"){
			 return "SC";
		 }
		 return " ";
	 }
	 function TSIresultExchange(char){
		 if(char=="a"){
			 return "K,A,H2S,GAS";
		 }else if(char=="b"){
			 return "K,H2S,GAS";
		 }else if(char=="c"){
			 return "A,H2S,GAS";
		 }
		 return " ";
	 }
	 function resultExchangeRIGHT(char){
		 if(char=="r"){
			 return "检出";
		 }
		 return " ";
	 }
	  function resultExchangeError(char){
		 if(char=="e"){
			 return "排除";
		 }
		 return " ";
	 }
	  function resultExchangeNonesimple(char){
		 if(char=="l"){
			 return "没样";
		 }
		 return " ";
	 }
	  function plusExchange(char){
		 if(char=="+"){
			 return "+";
		 }else if(char=="-"){
			 return "-";
		 }
		 return " ";
	 }
	  function focusSelect(id){
			
			var selectedtr=document.getElementById(id);
			 selectedtr.style.backgroundColor = "#e3eee3";
		}
		function blurSelect(id){
			var selectedtr=document.getElementById(id);
			if(id.charAt(id.length-1)%2==0){
				
				selectedtr.style.backgroundColor = "#b9d5b9";
			}else{
				selectedtr.style.backgroundColor = "#8fbc8f";
			}
			 
		}
