<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

<title th:text="${tablename}"></title>
<script th:src="@{script/jQuery3.7.1.js}"></script>
<style>

	}

		height: 100%;
	}
	#lclose{
		position: absolute;
		
		top:0%;
		left: 90%;
	}
	#setFDataLabel{
		
		display: inline-block;	
			 
		border:2px solid ;
        padding: 20px;
        margin: 10px;
          width:10%;
  height: 5%;
        background-color:  rgb(0, 255, 0);
	}
	#setDataLabel{
		
		display: inline-block;	
			 
		border:2px solid ;
        padding: 20px;
        margin: 10px;
          width:10%;
  height: 5%;
        background-color:  rgb(0, 128, 255);
	}

		display: inline-block;

        margin: 10px;

</head>
<body>
	<label for="setFdata" id="setFDataLabel">记录复测沙门数据</label>
		<button id="setFdata" onclick="window.location.href='/recordFselData'" hidden></button>
		<label for="setdata" id="setDataLabel">记录初测沙门数据</label>
		<button id="setdata" onclick="window.location.href='/recordselData'" hidden></button>
		<label id="con" name="table_name" th:text="${tablename}" th:value="${tablename}" hidden></label>
		<label for="manual" id="mbut">当天数据</label>
	<button id="manual"  onclick="openmanualPanel()" hidden></button>
	
<table  bgcolor="#8fbc8f"  border="1">
   <tr>
		<td>样品短号</td>
		<td>样品名称</td>
		<td>日期</td>		
		<td>过程1</td>
		<td>过程2</td>
		<td>过程3</td>
		<td>结果</td>
   </tr>
	<tr id="trid" th:each="simple:${simpleList}" onmouseover="focusSelect(this.id)" onmouseleave="blurSelect(this.id)">
	
	<td id="num" name="simpleNum" th:text="${simple.getNumber()}" th:value="${simple.getNumber()}" style="font-size: 30px;"></td>
	<td id="name" name="simpleName" th:text="${simple.getName()}" width="50px" ></td>
	
	<td  th:text="${simple.getDate()}" th:value="${simple.getDate()}" ></td>
		<label id="result" th:value="${simple.getSelomenResult()}"></label>	
	<td id="resultfirst"  >
		
	DHL<select  id="d1" name="dhl" onchange="todofors1(this.id)"><option value="n"></option><option value="a">RV,SC</option><option value="b">RV</option><option value="c">SC</option></select>
	XLD<select  id="x2" name="xld" onchange="todofors2(this.id)"><option value="n"></option><option value="a">RV,SC</option><option value="b">RV</option><option value="c">SC</option></select>	
	<div>	
	</td>
	<td id="resultsecond" width="200px">
		<div>
			TSI<select  id="t3" name="tsi"><option value="n"></option><option value="a">K,A,H2S,GAS</option><option value="b">K,H2S,GAS</option><option value="c">A,H2S,GAS</option></select>
	BUN<select  id="gb4" name="gbun" onchange="todofors3(this.id)"><option value="n"></option><option value="+">+</option><option value="-">-</option></select>
	O<select  id="o5" name="O"><option value="n"></option><option value="+">+</option><option value="-">-</option></select>
	H<select  id="h6" name="H" onchange="todofors4(this.id)"><option value="n"></option><option value="+">+</option><option value="-">-</option></select>
		</div>	
	</td>
	<td id="resultthird" width="400px">
		<div>
			
	LYS<select  id="l7" name="lys"><option value="n"></option><option value="+">+</option><option value="-">-</option></select>
	
	KCN<select  id="k8" name="kcn"><option value="n"></option><option value="+">+</option><option value="-">-</option></select>
	靛基质<select  id="d9" name="cas"><option value="n"></option><option value="+">+</option><option value="-">-</option></select>
	BUN<select  id="hb10" name="hbun"><option value="n"></option><option value="+">+</option><option value="-">-</option></select>
	甘露醇<select  id="m11" name="man"><option value="n"></option><option value="+">+</option><option value="-">-</option></select>
	山梨醇<select  id="s12" name="sor"><option value="n"></option><option value="+">+</option><option value="-">-</option></select>
	ONPG<select  id="on13" name="onpg" onchange="todofors5(this.id)"><option value="n"></option><option value="+">+</option><option value="-">-</option></select>
		</div>		
	</td>
	<td ><select  id="res14" name="result" onchange="todofors6(this.id)"><option value="n"></option><option value="r">检出</option><option value="e">排除</option><option value="l">没样</option></select></td>			
		<!--<td  width="100px"><label for="recorddata" ></label><input type="text" id="recorddata" name="data" th:value="${simple.getResult()}" onblur="todo(this.id)"/></td>	-->
	</tr>
	
	<button hidden></button>
</table>

<div id="manualPanel" hidden>
	<label for="close" id="lclose">X<button id="close" onclick="closemanualPanel()" hidden></button></label>
	<iframe id="selectSelmonfram" src="/recordingSuspectionSelomen" ></iframe>
</div>

		   x2id="x2"+i;
		   t3id="t3"+i;

		   o5id="o5"+i;
		   h6id="h6"+i;
		   l7id="l7"+i;
		   k8id="k8"+i;
		   d9id="d9"+i;
		   hb10id="hb10"+i;
		   m11id="m11"+i;
		   s12id="s12"+i;
		   on13id="on13"+i;
		   res14id="s14"+i;		  
		   
		    tr[i].setAttribute('id',trid);
		   result[i].setAttribute('id',resultid);
			   tdNum[i].setAttribute('id',tdNumid); 
			   tdNam[i].setAttribute('id',tdNamid);
			  d1[i].setAttribute('id',d1id);
			   d1[i].value = result[i].getAttribute('value').charAt(0);

			    h6[i].value = result[i].getAttribute('value').charAt(5);
			   l7[i].setAttribute('id',l7id);

			   d9[i].setAttribute('id',d9id);
			    d9[i].value = result[i].getAttribute('value').charAt(8);
			   hb10[i].setAttribute('id',hb10id);

			   on13[i].setAttribute('id',on13id);

			     res14[i].setAttribute('id',res14id);
			     res14[i].value = result[i].getAttribute('value').charAt(13);
			       if(i%2==0){
				   tr[i].style.backgroundColor = "#b9d5b9";
			  }
			    
	  }
	   var tablename=document.getElementById('con').getAttribute('value');
	 function g1(id1,id2){
		  var modeljson={
            "simpleNum":document.getElementById(id1).getAttribute('value'),          
             "dhl":document.getElementById(id2).value,
             "table_name":tablename
        }
        $.ajax({
            url:'/ajax/g1',
            data:modeljson,
            success:function (data,status){
                console.log(data)
                console.log(status)              
            }
        })
	 }
	
	 function todofors1(id){
		 var index;
		 var d1index
		 for(var i=0;i<tdNum.length;i++){
		 d1index= d1[i].getAttribute('id');
		  if(d1index===id){
			  index=i;			  
			  break;
		  }		 
	  }
		var tdNumid="tdnum"+index;
		var tdNamid="tdnam"+index;	
		
		 g1(tdNumid,d1index,);     
    }

		 for(var i=0;i<tdNum.length;i++){
		 on13index= on13[i].getAttribute('id');
		  if(on13index===id){

		  }

		var tdNumid="tdnum"+index;
		var tdNamid="tdnam"+index;	
		var l7index="l7"+index;
		var k8index="k8"+index;
		var d9index="d9"+index;

		var tdNumid="tdnum"+index;

    }
     function focusSelect(id){
			
			var selectedtr=document.getElementById(id);
			 selectedtr.style.backgroundColor = "#e3eee3";
		}
		function blurSelect(id){
			var selectedtr=document.getElementById(id);
			if(id.charAt(id.length-1)%2==0){
				
				selectedtr.style.backgroundColor = "#b9d5b9";
			}else{
				selectedtr.style.backgroundColor = "#8fbc8f";
			}
			 
		}
		 function openmanualPanel(){
		var d =document.getElementById("manualPanel");
	   d.hidden=false;
	}
	function closemanualPanel(){
		var d =document.getElementById("manualPanel");
	   d.hidden=true;
	}
	 </script>
</body>
</html>
