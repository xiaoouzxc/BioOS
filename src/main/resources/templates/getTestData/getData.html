<script th:inline="javascript">
	
	var checkbox = document.querySelectorAll('#check');
	var tdNum = document.querySelectorAll('#num');
	var tdNam = document.querySelectorAll('#name');
	var fDatelabel = document.querySelectorAll('#fDatelabel');
	var donelabeld=document.querySelectorAll('#condonelabel');
	var tr = document.querySelectorAll('#trid');

	 for(var i=0;i<checkbox.length;i++){
		   var trid="tr"+i;
		  var checkboxid="check"+i;
		  var tdNumid="tdnum"+i;
		  var tdNamid="tdnam"+i;
		  var fDatelabelid="fDatelabel"+i;
		   var donelabelid="donelabeldid"+i;
		   if(i%2==0){
				   tr[i].style.backgroundColor = "#b9d5b9";
			  }
		  checkbox[i].setAttribute('id',checkboxid);
		  tr[i].setAttribute('id',trid);
		  if(checkbox[i].getAttribute('value').charAt(0)==="F"){
			  tdNum[i].style.backgroundColor="blue";
			  checkbox[i].checked=true;
		  }
		   if(checkbox[i].getAttribute('value')==="BF"||checkbox[i].getAttribute('value')==="RBF"){
			  tdNum[i].style.backgroundColor="red";
		  }
			   tdNum[i].setAttribute('id',tdNumid); 
			   tdNam[i].setAttribute('id',tdNamid)
			   fDatelabel[i].setAttribute('id',fDatelabelid)
			    donelabeld[i].setAttribute('id',donelabelid);
			     if(donelabeld[i].getAttribute('value')==0){
			  tdNum[i].style.backgroundColor="yellow";
		  }
	  }
	   
	 function b1(id1,id2){
		  var modeljson={
            "simpleNum":document.getElementById(id1).getAttribute('value'),
            "id":document.getElementById(id1).getAttribute('dataID'),
            "simpleName":document.getElementById(id2).getAttribute('value'),
            "table_name":document.getElementById('con').getAttribute('value')
            
        }
        $.ajax({
            url:'/ajax/b',
            data:modeljson,
            success:function (data,status){
                console.log(data)
                console.log(status)
               
            }
        })
	 }
	
	 function todo(id){
		 for(var i=0;i<checkbox.length;i++){
		 var checkboxid= checkbox[i].getAttribute('id');
		  if(checkboxid===id){
			  trnum=i;			  
			  break;
		  }
		 
	  }

		var tdNumid="tdnum"+trnum;
		var tdNamid="tdnam"+trnum;
		var fDatelabelid="fDatelabel"+trnum;
		
		  
		 b1(tdNumid,tdNamid);
 
       
    }
    function getcontent(){
		var modeljson={
            "simpleNum":document.getElementById('simpleid').value 
            
        }
       	
                $.post({
                    url: "/ajax/query",
                    data:modeljson,
                    success: function (data) {
                        console.log(data);
                        var html = "";
                        var donecontentTransfer="已做";
                        for (var i = 0; i < data.length; i++) {
							
							if(data[i].done===0){
								donecontentTransfer="未做";
							
                            html += "<tr>" +
                                "<td>" + data[i].number + "</td>" +
                                "<td width='200px'>" + data[i].name + "</td>" +
                                "<td width='100px'>" + data[i].testItem + "</td>" +
                                "<td width='500px'>" + data[i].testMethod + "</td>" +
                                "<td>" + data[i].ifF + "</td>" +
                                "<td>" + data[i].result + "</td>" +
                                 "<td>" + donecontentTransfer + "</td>" +
                                "</tr>"
                                console.log(data[i].done+"--"+donecontentTransfer);
                        }
                        else{
							donecontentTransfer="已做";
							
                            html += "<tr>" +
                                "<td>" + data[i].number + "</td>" +
                                "<td width='200px'>" + data[i].name + "</td>" +
                                "<td width='100px'>" + data[i].testItem + "</td>" +
                                "<td width='500px'>" + data[i].testMethod + "</td>" +
                                "<td>" + data[i].ifF + "</td>" +
                                "<td>" + data[i].result + "</td>" +
                                 "<td>" + donecontentTransfer + "</td>" +
                                "</tr>"
                                console.log(data[i].done+"--"+donecontentTransfer);
						}}
                        $("#context").html(html)
                    }
                })
	}

	}

        function focusSelect(id){
			
			var selectedtr=document.getElementById(id);
			 selectedtr.style.backgroundColor = "#e3eee3";
		}
		function blurSelect(id){
			var selectedtr=document.getElementById(id);
			if(id.charAt(id.length-1)%2==0){
				
				selectedtr.style.backgroundColor = "#b9d5b9";
			}else{
				selectedtr.style.backgroundColor = "#8fbc8f";
			}
			 
		}
    function openmanualPanel(){

     function followScroll(){
		 var scrollTop=$(window).scrollTop;
		 var elementTop=$("#home").offset().top;
		 var distance=scrollTop-elementTop;
		 $("#home").css("top",distance+"px");
	 }
	 $(window).scroll(followScroll);
	 $(document).ready(function(){
		 followScroll();
	 });
