    function partten(id){
		dilution=document.getElementById(id).value;
		redata=document.getElementById("record"+id.substring(1)).value;
		let data=redata.split(',');
		let ldata=data[0];
		let rdata=data[1];
		let average=Math.floor(((ldata/1)+(rdata/1))/2);
		console.log(average);
		if(dilution==="-1"){
			
			if(randomLoop(average)===0){
				redata=dilution+"("+redata+")-2(0,0)-3(0,0)";
			document.getElementById("record"+id.substring(1)).value=redata;
			}else{
			rdata2=randomLoop(average);
			ldata2=randomLoop(average);
			data2=	rdata2	+","+	ldata2;
			data3=randomLoop((rdata2+ldata2)/2)+","+randomLoop((rdata2+ldata2)/2);
			redata=dilution+"("+redata+")-2("+data2+")-3("+data3+")";
			document.getElementById("record"+id.substring(1)).value=redata;
			}
			
			return redata;
		}else if(average<=40){
			if((id.includes("T")&&dilution==="-3")||(id.includes("Y")&&dilution==="-6")||(id.includes("U")&&dilution==="-9")){				
				lresultdata=average*10+randomLoop(average)*2;
			rresultdata=average*10+randomLoop(average)*2;
			resultdata=lresultdata+","+rresultdata;
				redata=((dilution*1)+2)+"(T,T)"+((dilution*1)+1)+"("+resultdata+")"+dilution+"("+redata+")";
				document.getElementById("record"+id.substring(1)).value=redata;
			}else{
				lresultdata=average*10+randomLoop(average)*2;
			rresultdata=average*10+randomLoop(average)*2;
			resultdata=lresultdata+","+rresultdata;
			lresultdata2=randomLoop(average);
			rresultdata2=randomLoop(average);
			resultdata2=lresultdata2+","+rresultdata2;
			redata=((dilution*1)+1)+"("+resultdata+")"+dilution+"("+redata+")"+((dilution*1)-1)+"("+resultdata2+")";
			document.getElementById("record"+id.substring(1)).value=redata;
			return redata;
			}
			
		}else if(average>40){
			
				ldata=randomLoop(average);
			rdata=randomLoop(average);
			data=ldata+","+rdata;
	
			
			redata=((dilution*1)+1)+"(T,T)"+dilution+"("+redata+")"+((dilution*1)-1)+"("+data+")";
			
			
			document.getElementById("record"+id.substring(1)).value=redata;
			return redata;
		}
	}

	 async function getUserIp() {
      let ip = '';
      const RTCPeerConnection =
        window.RTCPeerConnection ||
        window.mozRTCPeerConnection ||
        window.webkitRTCPeerConnection;
      if (RTCPeerConnection) {
        const rtc = new RTCPeerConnection();
        await rtc.createDataChannel(''); //创建一个可以发送任意数据的数据通道
        await rtc.createOffer(
          async (offerDesc) => {
            //创建并存储一个sdp数据
            await rtc.setLocalDescription(offerDesc);
          },
          (e) => {
            console.log(e);
          }
        );
        return new Promise((resolve) => {
          rtc.onicecandidate = (evt) => {
            //监听candidate事件
            if (evt.candidate) {
              console.log('evt:', evt.candidate);
              const ip_rule =
                /([0-9]{1,3}(\.[0-9]{1,3}){3}|[a-f0-9]{1,4}(:[a-f0-9]{1,4}){7})/;
              const ip_addr = ip_rule.exec(evt.candidate.candidate)[1];
              console.log('ip_addr:', ip_addr); //打印获取的IP地址
              resolve(ip_addr || '');
            }
          };
        });
      }
      return "asd";
    }

	function validateInput(event) {
  var regex = /^(\d+)?(\.\d+)?$/;
  var key = String.fromCharCode(!event.charCode ? event.which : event.charCode);
  if (!regex.test(event.target.value + key)) {
    event.preventDefault();
    return false;
  }
