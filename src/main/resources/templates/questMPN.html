<html>
<head>
<meta charset="UTF-8">

<style type="text/css">

white-space:pre-line;

#batchPanelTip {

#batchPanel {

#batchPanel .batchBtn {

<body>

<div>
	<table id="mainTable" bgcolor="#8fbc8f"  border="1">
   <tr>
		<!--<td>序号</td>-->
		
		<td>样品短号</td>
		<td>样品名称</td>

   </tr>
	<tr id="trid"  th:each="simple:${presentList}" >
		<td hidden><button id="heapbt" >已做</button>
		<label id="done" th:value="${simple.getDone()}"></label>
		<label id="F" th:value="${simple.getIfF()}"></label></td>
	<td th:text="${simple.getNumber()}" style="font-size: 30px;"></td>

	<td th:text="${simple.getCompany()}" width="50px"></td>
	<td  th:text="${simple.getTestItem()}" style="font-size: 30px;"></td>
	<td th:text="${simple.getUnit()}"></td>

	<td th:text="${simple.getTip()}" width="100px"></td>	
	</tr>
	
</table>

</div>

<!-- 右侧批次按钮面板 -->

    <div id="batchPanelTip" style="display: flex; align-items: flex-start; width: fit-content;"><p style="writing-mode: vertical-rl; text-orientation: upright; margin-right: 8px; height: 100%;">单独查看某一批</p></div>
    <div id="batchPanel" style="display: flex; flex-direction: column;"></div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
$(document).ready(function(){
  // 1. 首次向后端请求所有批次
  $.getJSON('/batches', function(batchList) {
    const panel = $('#batchPanel').empty();
    batchList.forEach(function(b){
      $('<button>')
        .addClass('batchBtn')
        .text(b)
        .data('batch', b)
        .appendTo(panel);
    });
  });

  // 2. 点击某个批次按钮
  $('#batchPanel').on('click', '.batchBtn', function(){
    const batch = $(this).data('batch');
    // 发 AJAX 拿 simpleList
    $.getJSON('/simples', { batch: batch }, function(simpleList){
     function renderTable(simpleList) {
  const tbody = $('#mainTable').empty();  // 先清空

  simpleList.forEach((simple, i) => {
    // 用模板字符串直接写出跟你 Thymeleaf 一模一样的结构
    const row = $(`
      <tr id="trid-${i}">
        <td hidden>
          <button id="heapbt-${i}">已做</button>
          <label id="done-${i}" value="${simple.done}"></label>
          <label id="F-${i}"    value="${simple.ifF}"></label>
        </td>
        <td style="font-size:30px;">${simple.number}</td>
        <td width="50px">${simple.name}</td>
        <td width="50px">${simple.company}</td>
        <td style="font-size:30px;">${simple.testItem}</td>
        <td>${simple.unit}</td>
        <td width="400px">${simple.testMethod}</td>
        <td width="100px">${simple.tip}</td>
      </tr>
    `);

    // 如果 done=1，给整行加个标记颜色；或者 ifF 包含 BF 时加红……
    if (simple.done === 1) {
      row.css('background-color', 'purple');
    } else if ((simple.ifF||'').includes('BF')) {
      row.css('background-color', 'red');
    } else if (i % 2 === 0) {
      row.css('background-color', '#b9d5b9');
    }

    // 绑定按钮点击事件
    row.find(`#heapbt-${i}`).on('click', () => {
      changeColor(`heapbt-${i}`);
    });

    tbody.append(row);
  });
}

// 你的批次按钮点击之后：
$('#batchPanel').on('click', '.batchBtn', function(){
  const batch = $(this).data('batch');
  $.getJSON('/simples', { batch }, function(data){
    renderTable(data);
  });
});

// 复用你原来的 changeColor 函数
function changeColor(id) {
  const btns = $('button[id^="heapbt-"]');
  btns.each(function(idx, btn){
    if (btn.id === id) {
      $(`#trid-${idx}`).css('background-color', 'red');
      return false;
    }
  });
}
    });
  });
});
</script>


<script src="script/plusSelect.js"></script>
