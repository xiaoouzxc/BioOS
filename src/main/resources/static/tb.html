<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
</head>
<body>
<table id="myTable">
    <tr>
		<td><a href="javascript:void(0);"  οnclick="delRow(this)">删除</a></td>
	</tr>
</table>
 	<script>
function delRow(obj) {
		var tr = this.getRowObj(obj);
		if (tr != null) {
			tr.parentNode.removeChild(tr);
			
			//$("#p_" + removeRow).show();
			//$("#p1_" + removeRow).show();
		} else {
			throw new Error("the given object is not contained by the table");
		}
	}
	function getRowObj(obj) {
		var i = 0;
		while (obj.tagName.toLowerCase() != "tr") {
			obj = obj.parentNode;
			if (obj.tagName.toLowerCase() == "table")
				return null;
		}
		return obj;
	}
</script>
</body>
</html>
