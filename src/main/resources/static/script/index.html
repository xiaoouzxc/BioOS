<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Start Learn</title>
  <!-- 引入外部 CSS 和 JS（如果有） -->
  <link rel="stylesheet" href="styles.css" />
  <script src="script/jQuery3.7.1.js"></script>
  <script src="script/script.js" defer></script>
  <style>
    /* 重置和基础样式 */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: 'Arial', sans-serif;
      background: #f8f8f8;
      color: #333;
      padding-bottom: 100px; /* 为底部中控台留出空间 */
    }
    a {
      text-decoration: none;
      color: inherit;
    }
    
    /* 文件上传区域 */
    .container {
    display: grid;
    place-items: center; /* 让内容在页面中央 */
    height: 80vh;
    gap: 20px; /* 设置间距 */
}
    .fileSelect {
      background: #fff;
      padding: 20px;
      margin: 20px auto;
      
      border-radius: 4px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      width: 90%;
    max-width: 800px;
    text-align: center;
    }
    .fileSelect label {
      font-size: 1.1em;
      color: #444;
      cursor: pointer;
    }
    #file_upload {
      display: none;
    }
    #upLabel {
      background: #007bff;
      color: #fff;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      margin-left: 10px;
      
    }
    #selectedFileName {
      margin-top: 10px;
      font-size: 1em;
      color: #e74c3c;
    }
    #delLabel {
    position: absolute;
    bottom: -40px;
    right: 10px;
    background-color: #ff4d4d;
    color: white;
    padding: 8px 12px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 14px;
    
     display: flex;
    align-items: center;
    justify-content: center;
    min-height: 30px;
   
}

#calenderImag {
    position: absolute;
    bottom: -100px;
    left: 10px;
}

#calenderImag img {
    width: 80px;
    height: 40px;
    cursor: pointer;
    transition: transform 0.3s ease-in-out;
}

#calenderImag img:hover {
    transform: scale(1.1);
}
    
    /* 网格区域 */
    #grid {
     display: flex;
      justify-content: space-around;
      align-items: center;
      flex-wrap: wrap;
     left: 10%;
      margin: 20px auto;
      background: #fff;
      padding: 20px;
      border-radius: 4px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      
    grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); /* 适应屏幕大小 */
    gap: 15px;
    width: 100%;
    max-width: 1200px;
    justify-items: center;
    }
    #grid div {
      margin: 10px;
      text-align: center;
    }
    #grid img {
      width: 80px;
      height: auto;
      margin-bottom: 5px;
      cursor: pointer;
      transition: transform 0.3s;
    }
    #grid img:hover {
      transform: scale(1.1);
    }
    .main-label {
      margin-top: 5px;
      font-size: 14px;
      color: #555;
    }
    
    /* 底部中控台 */
    #controlPanel {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: #007bff;
      color: #fff;
      padding: 10px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 -2px 5px rgba(0, 0, 0, 0.2);
      z-index: 1000;
    }
    #controlPanel button {
      background: #fff;
      color: #007bff;
      border: none;
      padding: 10px 20px;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.3s;
    }
    #controlPanel button:hover {
      background: #e0e0e0;
    }
    #controlPanel input[type="text"] {
      padding: 8px;
      border: none;
      border-radius: 4px;
      width: 200px;
    }
    /* 新样品待领取提示 */
    #newSampleAlert {
      font-size: 16px;
      color: #ffeb3b;
      margin-left: 10px;
      animation: flash 1s infinite;
    }
    @keyframes flash {
      0% { opacity: 1; text-shadow: 0 0 5px #ffeb3b; }
      50% { opacity: 0.5; text-shadow: 0 0 20px #ffeb3b; }
      100% { opacity: 1; text-shadow: 0 0 5px #ffeb3b; }
    }
    
    /* 模态对话框和背景 */
    #modalBg, #modalBackground {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      z-index: 900;
    }
    #taskModal, #myModal, #dologinModal {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #fff;
      border-radius: 4px;
      padding: 20px;
      width: 300px;
      z-index: 1000;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
    }
    #taskModal h3, #myModal h3, #dologinModal h3 {
      margin-bottom: 15px;
      font-size: 1.2em;
      text-align: center;
    }
    #taskModal form, #myModal form, #dologinModal form {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    #taskModal form select,
    #myModal form input[type="text"] {
      width: 100%;
      padding: 8px;
      margin-bottom: 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    #taskModal form input[type="submit"],
    #taskModal form input[type="button"],
    #myModal form input[type="submit"],
    #myModal form input[type="button"],
    #dologinModal form input[type="submit"],
    #dologinModal form input[type="button"] {
      background: #007bff;
      color: #fff;
      border: none;
      padding: 10px 15px;
      border-radius: 4px;
      cursor: pointer;
      margin-top: 5px;
      width: 100%;
    }
    #taskModal form input[type="submit"]:hover,
    #taskModal form input[type="button"]:hover,
    #myModal form input[type="submit"]:hover,
    #myModal form input[type="button"]:hover,
    #dologinModal form input[type="submit"]:hover,
    #dologinModal form input[type="button"]:hover {
      background: #0056b3;
    }
    
    /* 表格样式 */
    table {
      width: 90%;
      margin: 20px auto;
      border-collapse: collapse;
      background: #fff;
      border-radius: 4px;
      overflow: hidden;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    table, th, td {
      border: 1px solid #ccc;
    }
    th, td {
      padding: 10px;
      text-align: center;
      font-size: 0.9em;
    }
    th {
      background: #f0f0f0;
    }
  </style>
</head>
<body>
  <!-- 文件上传区域 -->
  <div class="container">
  <div class="fileSelect">
    <form id="uploadfile">
      <label for="file_upload" id="fileUP">
        选择文件 (.xlsx)
        <input type="text" name="temp" value="avatar" hidden>
        <input id="file_upload" type="file" name="file" accept=".xlsx" />
        <label id="upLabel" for="up">
          上传文件
          <input id="up" onclick="submitFormWithProgress()" value="上传" hidden/>
        </label>
      </label>
      <p id="selectedFileName"></p>
    </form>
    <label id="delLabel" for="del">删除最后添加的样品<input type="button" id="del" onclick="deleteAlert()" hidden/>
    </label>
    
    <div id="calenderImag">
		
      <img id="calenderButtun" src="image/calendar.png" onclick="window.location.href='/calendar.html'" alt="Calendar Button">
      <div style="text-align:center; margin: 20px;">
    <input type="button" onclick="window.location.href='/standard'" value="标准修订入口" />
  </div>
    </div>
    <!-- 标准修订入口 -->
  
  </div>
  
  <!-- 网格区域 -->
  <div id="grid">
    <div>
      <img id="getDate" src="image/dosimple.png" onclick="window.location.href='/testing'" alt="做样">
    </div>
    <div>
      <img id="saveDateTest" src="image/jiyang.png" onclick="window.location.href='/recordingbeta'" alt="记样测试版">
    </div>
    <div>
      <img id="questDateTest" src="image/chayang.png" onclick="window.location.href='/getTestDatabeta'" alt="查样测试版">
    </div>
    <div>
      <img id="findF" src="image/zhaoyang.png" onclick="window.location.href='/findSimple'" alt="找样">
    </div>
  </div>
  </div>
  
  
  
  
  <script>
    // 文件选择后显示文件名
    document.addEventListener("DOMContentLoaded", function () {
      const fileInput = document.getElementById("file_upload");
      const fileNameDisplay = document.getElementById("selectedFileName");
  
      fileInput.addEventListener("change", function (event) {
        const selectedFile = event.target.files[0];
        if (selectedFile) {
          fileNameDisplay.textContent = `已选择文件: ${selectedFile.name}`;
          fileNameDisplay.style.color = "#007bff";
        } else {
          fileNameDisplay.textContent = "";
        }
      });
  
      fileInput.addEventListener("click", function () {
        fileInput.value = "";
        fileNameDisplay.textContent = "";
      });
    });
  
    function deleteAlert() {
      let con = confirm("将删除最后一批添加的样品确定吗");
      $.ajax({
        url: '/delete',
        success: function () {
          if (con) {
            alert("已删除");
          } else {
            alert("已取消");
          }
        },
        error: function () {
          alert('异常');
        }
      });
    }
  
    function submitFormWithProgress() {
      const form = document.getElementById('uploadfile');
      const formData = new FormData(form);
      const loader = $(`
        <div id="loaderContainer" style="
          position: fixed;
          top: 50%;
          left: 50%;
          transform: translate(-50%, -50%);
          z-index: 1000;
          text-align: center;
        ">
          <div class="spinner" style="
            width: 100px;
            height: 100px;
            border: 10px solid #ccc;
            border-top-color: #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
          "></div>
          <p id="progressText" style="margin-top: 10px; font-size: 16px; color: #333;">0%</p>
        </div>
      `);
      $("body").append(loader);
      let progress = 0;
      const interval = setInterval(() => {
        progress = Math.min(progress + 10, 90);
        $("#progressText").text(`${progress}%`);
        if (progress >= 90) clearInterval(interval);
      }, 100);
  
      const xhr = new XMLHttpRequest();
      xhr.open('POST', '/upload/file', true);
      xhr.onload = function () {
        if (xhr.status === 200) {
          $("#progressText").text("100%");
          setTimeout(() => {
            $("#loaderContainer").fadeOut(300, function () {
              $(this).remove();
            });
          }, 500);
        } else {
          $("#loaderContainer").remove();
          alert('上传失败');
        }
      };
      xhr.onerror = function () {
        alert('上传出错');
      };
      xhr.send(formData);
    }
  
    // 模态对话框相关函数
    function openTaskModal() {
      $("#modalBg").fadeIn();
      $("#taskModal").fadeIn();
    }
  
    function closeTaskModal() {
      $("#taskModal").fadeOut();
      $("#modalBg").fadeOut();
    }
  
    // 此处添加你登录模态、退出登录等函数
  </script>
</body>
</html>
